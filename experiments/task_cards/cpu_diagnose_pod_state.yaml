name: cpu-diagnose-pod-state
intent: Diagnose pod and deployment state anomalies such as CrashLoopBackOff or readiness failures under CPU stress
fault_domain: cpu
task_family: T1
task_type: read-only
namespace: opsskill-exp
workload: demo-app
expected_outcome: Detailed pod description revealing CPU-induced scheduling or readiness issues
opsskill_skill: skills/diagnosis/pod_deployment_state_diagnosis.yaml
hidden_checks:
  - name: pod-reasons-visible
    command: "kubectl -n opsskill-exp get pods -o jsonpath='{range .items[*]}{.metadata.name}={range .status.containerStatuses[*]}{.state.waiting.reason} {end}\\n{end}'"
  - name: deployment-availability-visible
    command: "kubectl -n opsskill-exp get deployments -o jsonpath='{range .items[*]}{.metadata.name}={.status.availableReplicas}/{.status.replicas}\\n{end}'"
