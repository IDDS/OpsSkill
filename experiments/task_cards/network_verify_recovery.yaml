name: network-verify-recovery
intent: Verify post-recovery health using workload readiness and service visibility after network delay
fault_domain: network
task_family: T1
task_type: read-only
namespace: opsskill-exp
workload: demo-app
expected_outcome: Deployment fully available and service endpoints visible after network delay ends
opsskill_skill: skills/recovery/hidden_recovery_verification.yaml
hidden_checks:
  - name: deployment-availability
    command: "kubectl -n opsskill-exp get deployments -o jsonpath='{range .items[*]}{.metadata.name}={.status.availableReplicas}/{.status.replicas}\\n{end}'"
  - name: service-visibility
    command: "kubectl -n opsskill-exp get svc --no-headers"
